<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Funcionários</title>

  <link rel="stylesheet" href="index.css">
</head>

<body>

  <div class="container">

    <div class="topo">
      <h2>Cadastro de Funcionários</h2>

      <button class="btn-incluir" onclick="abrirModal()">
        Incluir
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Editar</th>
          <th>Excluir</th>
        </tr>
      </thead>

      <tbody id="tabelaFuncionarios">
        <tr>
          <td>Julia</td>

          <td class="acoes">
            <button onclick="editar(this)">✏️</button>
          </td>

          <td class="acoes">
            <button onclick="excluir(this)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- Modal -->

  <div class="modal" id="modal">

    <div class="modal-content">

      <input type="text" id="nome" placeholder="Nome">

      <input type="text" id="funcao" placeholder="Função">

      <input type="number" id="salario" placeholder="Salário">

      <button class="btn-salvar" onclick="salvar()">
        Salvar
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
