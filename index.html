<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    
 
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="topo">
      <h2>Cadastro de Funcionários</h2>
      <button class="btn" onclick="abrirModal()">
        Incluir
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Função</th>
          <th>Salário</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaFuncionarios"></tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">

      <h3>Cadastro de Funcionário</h3>

      <div class="input-group">
        <label>Nome</label>
        <input type="text" id="nome">
      </div>

      <div class="input-group">
        <label>Função</label>
        <input type="text" id="funcao">
      </div>

      <div class="input-group">
        <label>Salário</label>
        <input type="number" id="salario">
      </div>

      <button class="btn salvar" onclick="salvarFuncionario()">
        Salvar
      </button>

    </div>
  </div>

  <script src="script.js"></script>
    
</body>
</html>
